# =====================================================
# Configuration de la Base de Données MySQL
# =====================================================

# URL de connexion à la base de données
spring.datasource.url=jdbc:mysql://localhost:3306/forage?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Identifiant de connexion
spring.datasource.username=root

# Mot de passe
spring.datasource.password=

# Driver JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# Configuration Hibernate/JPA
# =====================================================

# Dialecte Hibernate pour MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Stratégie de génération des tables
# create: Crée les tables (supprime l'existant)
# update: Met à jour les tables existantes
# validate: Valide que les tables existent (pas de modification)
# create-drop: Crée et supprime à l'arrêt de l'application
spring.jpa.hibernate.ddl-auto=update

# Afficher les requêtes SQL générées
spring.jpa.show-sql=true

# Formater les requêtes SQL pour meilleure lisibilité
spring.jpa.properties.hibernate.format_sql=true

# Afficher les paramètres des requêtes SQL
spring.jpa.properties.hibernate.use_sql_comments=true

# =====================================================
# Configuration du serveur
# =====================================================

# Port du serveur
server.port=8080

# Contexte racine de l'application
server.servlet.context-path=/forage

# =====================================================
# Encodage
# =====================================================

# Encodage des fichiers source
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
